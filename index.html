<!DOCTYPE html>
<html>

<head>

<title>steak.com</title>

<style>

body{
background:#0b0f1a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#12182b;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #1f2a44;
}

header h1{
color:#4da3ff;
margin:0;
}

nav span{
margin-left:20px;
color:#9bb4d4;
}

.container{
padding:30px;
max-width:1200px;
margin:auto;
}

.balance{
font-size:20px;
margin-bottom:15px;
}

.bet-input{
margin-bottom:20px;
}

input,select{
padding:6px;
margin:5px;
background:#1a2338;
border:1px solid #2a3657;
color:white;
}

button{
padding:10px 16px;
background:#2f6df6;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
margin:5px;
transition:0.2s;
}

button:hover{
background:#4da3ff;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.game{
background:#12182b;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
text-align:center;
}

.game h2{
margin-top:0;
color:#4da3ff;
}

canvas{
background:#0a0d17;
margin-top:10px;
}

.slot{
font-size:40px;
letter-spacing:10px;
margin:10px;
}

footer{
text-align:center;
padding:20px;
color:#6e87a8;
border-top:2px solid #1f2a44;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>steak.com</h1>

<nav>
<span>Casino</span>
<span>Games</span>
<span>Leaderboard</span>
</nav>
</header>

<div class="container">

<div class="balance">
Balance: <span id="balance">1000</span> coins
</div>

<div class="bet-input">
Bet Amount
<input id="bet" type="number" value="50">
</div>

<div class="games">

<!-- ROULETTE -->

<div class="game">

<h2>🎡 Roulette</h2>

<input id="rouletteGuess" type="number" min="1" max="36">

<br>

<button onclick="roulette()">Spin</button>

<div style="position:relative;width:220px;margin:auto">

<div style="
position:absolute;
top:-10px;
left:105px;
width:0;
height:0;
border-left:10px solid transparent;
border-right:10px solid transparent;
border-bottom:20px solid yellow;
z-index:10;
"></div>

<canvas id="rouletteWheel" width="220" height="220"></canvas>

</div>

<p id="rouletteResult"></p>

</div>

<!-- COIN -->

<div class="game">

<h2>🪙 Coin Flip</h2>

<select id="coinGuess">
<option value="heads">Heads</option>
<option value="tails">Tails</option>
</select>

<button onclick="coinFlip()">Flip</button>

<p id="coinResult"></p>

</div>

<!-- DICE -->

<div class="game">

<h2>🎲 Dice</h2>

<input id="diceGuess" type="number" min="1" max="6">

<button onclick="rollDice()">Roll</button>

<p id="diceResult"></p>

</div>

<!-- HIGH LOW -->

<div class="game">

<h2>⬆️⬇️ High / Low</h2>

<select id="highlowGuess">
<option value="high">High</option>
<option value="low">Low</option>
</select>

<button onclick="highLow()">Play</button>

<p id="highlowResult"></p>

</div>

<!-- CRASH -->

<div class="game">

<h2>🚀 Crash</h2>

<button onclick="startCrash()">Start</button>
<button onclick="cashOut()">Cash Out</button>

<h2 id="crashMultiplier">1.00x</h2>

<p id="crashResult"></p>

</div>

<!-- BLACKJACK -->

<div class="game">

<h2>🃏 Blackjack</h2>

<button onclick="startBlackjack()">Start Game</button>
<button onclick="hit()">Hit</button>
<button onclick="stand()">Stand</button>

<p id="playerHand"></p>
<p id="dealerHand"></p>
<p id="blackjackResult"></p>

</div>

<!-- SLOT MACHINE -->

<div class="game">

<h2>🎰 Slots</h2>

<button onclick="spinSlots()">Spin</button>

<div id="slotDisplay" class="slot">❔ ❔ ❔</div>

<p id="slotResult"></p>

</div>

</div>
</div>

<footer>
Demo casino project • Front-end JavaScript simulation
</footer>

<script>

/* BALANCE */

let balance = 1000

function update(){
document.getElementById("balance").innerText = balance
}

function getBet(){
return parseInt(document.getElementById("bet").value)
}

/* COIN */

function coinFlip(){

let guess=document.getElementById("coinGuess").value
let bet=getBet()

let result=Math.random()<0.5?"heads":"tails"

if(guess===result) balance+=bet
else balance-=bet

document.getElementById("coinResult").innerText="Result: "+result

update()

}

/* DICE */

function rollDice(){

let guess=parseInt(document.getElementById("diceGuess").value)
let bet=getBet()

let roll=Math.floor(Math.random()*6)+1

if(guess===roll) balance+=bet*2
else balance-=bet

document.getElementById("diceResult").innerText="Rolled: "+roll

update()

}

/* HIGH LOW */

function highLow(){

let guess=document.getElementById("highlowGuess").value
let bet=getBet()

let number=Math.floor(Math.random()*100)+1

let result = number>50 ? "high" : "low"

if(result===guess) balance+=bet
else balance-=bet

document.getElementById("highlowResult").innerText="Number: "+number

update()

}

/* ROULETTE */

const wheel=document.getElementById("rouletteWheel")
const ctx=wheel.getContext("2d")

let rotation=0

function drawWheel(){

const segments=36
const radius=100

ctx.clearRect(0,0,220,220)

ctx.save()
ctx.translate(110,110)
ctx.rotate(rotation)

for(let i=0;i<segments;i++){

let startAngle=i*(2*Math.PI/segments)
let endAngle=startAngle+(2*Math.PI/segments)

ctx.beginPath()
ctx.moveTo(0,0)
ctx.arc(0,0,radius,startAngle,endAngle)

ctx.fillStyle=i%2==0?"red":"black"

ctx.fill()

ctx.save()

ctx.rotate(startAngle+(Math.PI/segments))
ctx.fillStyle="white"
ctx.font="10px Arial"
ctx.fillText(i+1,60,5)

ctx.restore()

}

ctx.restore()

}

drawWheel()

function roulette(){

let guess=parseInt(document.getElementById("rouletteGuess").value)
let bet=getBet()

let spin=Math.floor(Math.random()*36)

let segmentAngle=(2*Math.PI)/36
let targetRotation=(Math.PI/2)-(spin*segmentAngle)

let spins=6*2*Math.PI

let startRotation=rotation
let endRotation=startRotation+spins+targetRotation

let startTime=null

function animate(time){

if(!startTime) startTime=time

let progress=time-startTime

rotation=startRotation+(endRotation-startRotation)*(progress/2000)

drawWheel()

if(progress<2000){
requestAnimationFrame(animate)
}else{

rotation=endRotation

let winningNumber=spin+1

if(guess===winningNumber) balance+=bet*10
else balance-=bet

document.getElementById("rouletteResult").innerText="Number: "+winningNumber

update()

}

}

requestAnimationFrame(animate)

}

/* CRASH */

let crashRunning=false
let multiplier=1
let crashPoint

function startCrash(){

if(crashRunning) return

let bet=getBet()

balance-=bet
update()

crashRunning=true
multiplier=1
crashPoint=Math.random()*5+1

let interval=setInterval(()=>{

multiplier+=0.05

document.getElementById("crashMultiplier").innerText=
multiplier.toFixed(2)+"x"

if(multiplier>=crashPoint){

clearInterval(interval)

crashRunning=false

document.getElementById("crashResult").innerText=
"CRASHED at "+multiplier.toFixed(2)

}

},100)

}

function cashOut(){

if(!crashRunning) return

let bet=getBet()

balance+=Math.floor(bet*multiplier)

update()

document.getElementById("crashResult").innerText=
"Cashed out at "+multiplier.toFixed(2)

crashRunning=false

}

/* BLACKJACK */

let playerHand=[]
let dealerHand=[]
let gameActive=false

function drawCard(){
return Math.floor(Math.random()*10)+1
}

function handValue(hand){
return hand.reduce((a,b)=>a+b,0)
}

function startBlackjack(){

playerHand=[drawCard(),drawCard()]
dealerHand=[drawCard(),drawCard()]

gameActive=true

updateBlackjack()

}

function hit(){

if(!gameActive) return

playerHand.push(drawCard())

if(handValue(playerHand)>21){

document.getElementById("blackjackResult").innerText="Bust! Dealer wins"
gameActive=false

}

updateBlackjack()

}

function stand(){

if(!gameActive) return

while(handValue(dealerHand)<17){
dealerHand.push(drawCard())
}

let playerScore=handValue(playerHand)
let dealerScore=handValue(dealerHand)

let result=""

if(dealerScore>21 || playerScore>dealerScore){
result="Player wins"
}else if(playerScore<dealerScore){
result="Dealer wins"
}else{
result="Push"
}

document.getElementById("blackjackResult").innerText=result

gameActive=false

updateBlackjack()

}

function updateBlackjack(){

document.getElementById("playerHand").innerText=
"Player: "+playerHand.join(", ")+" (Total "+handValue(playerHand)+")"

document.getElementById("dealerHand").innerText=
"Dealer: "+dealerHand.join(", ")+" (Total "+handValue(dealerHand)+")"

}

/* SLOT MACHINE */

const symbols=["🍒","🍋","🍊","⭐","7️⃣"]

function spinSlots(){

let bet=getBet()

let spins=0

let interval=setInterval(()=>{

let s1=symbols[Math.floor(Math.random()*symbols.length)]
let s2=symbols[Math.floor(Math.random()*symbols.length)]
let s3=symbols[Math.floor(Math.random()*symbols.length)]

document.getElementById("slotDisplay").innerText=s1+" "+s2+" "+s3

spins++

if(spins>15){

clearInterval(interval)

if(s1===s2 && s2===s3){

balance+=bet*5
document.getElementById("slotResult").innerText="Jackpot!"

}else if(s1===s2 || s2===s3 || s1===s3){

balance+=bet*2
document.getElementById("slotResult").innerText="Small win!"

}else{

balance-=bet
document.getElementById("slotResult").innerText="No match"

}

update()

}

},100)

}

</script>

</body>

</html>

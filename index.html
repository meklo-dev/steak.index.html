<!DOCTYPE html>
<html>

<head>

<title>steak.com</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

header{
background:#065f46;
padding:15px;
}

.container{
padding:20px;
}

.game{
background:#1e293b;
padding:20px;
margin:20px auto;
border-radius:6px;
max-width:520px;
}

button{
padding:10px 16px;
background:#10b981;
border:none;
color:white;
cursor:pointer;
border-radius:4px;
margin:5px;
}

button:hover{
background:#059669;
}

input,select{
padding:6px;
margin:5px;
}

canvas{
background:#111;
margin-top:10px;
border-radius:50%;
}

</style>

</head>

<body>

<header>
<h1>steak.com</h1>
</header>

<div class="container">

<h2>Balance: <span id="balance">1000</span> coins</h2>

Bet Amount
<input id="bet" type="number" value="50">

<!-- ROULETTE -->

<div class="game">

<h2>Roulette</h2>

<input id="rouletteGuess" type="number" min="1" max="36">

<br>

<button onclick="roulette()">Spin</button>

<div style="position:relative;width:200px;margin:auto">

<div style="
position:absolute;
top:-5px;
left:95px;
width:0;
height:0;
border-left:10px solid transparent;
border-right:10px solid transparent;
border-bottom:20px solid yellow;
z-index:10;
"></div>

<canvas id="rouletteWheel" width="200" height="200"></canvas>

</div>

<p id="rouletteResult"></p>

</div>


<!-- COIN FLIP -->

<div class="game">

<h2>Coin Flip</h2>

<select id="coinGuess">
<option value="heads">Heads</option>
<option value="tails">Tails</option>
</select>

<button onclick="coinFlip()">Flip</button>

<p id="coinResult"></p>

</div>


<!-- DICE -->

<div class="game">

<h2>Dice</h2>

<input id="diceGuess" type="number" min="1" max="6">

<button onclick="rollDice()">Roll</button>

<p id="diceResult"></p>

</div>


<!-- CRASH -->

<div class="game">

<h2>Crash</h2>

<button onclick="startCrash()">Start</button>
<button onclick="cashOut()">Cash Out</button>

<h2 id="crashMultiplier">1.00x</h2>

<p id="crashResult"></p>

</div>


<!-- PLINKO -->

<div class="game">

<h2>Plinko</h2>

<button onclick="dropBall()">Drop Ball</button>

<canvas id="plinko" width="300" height="200"></canvas>

<p id="plinkoResult"></p>

</div>


<!-- BLACKJACK -->

<div class="game">

<h2>Blackjack</h2>

<button onclick="startBlackjack()">Start Game</button>
<button onclick="hit()">Hit</button>
<button onclick="stand()">Stand</button>

<p id="playerHand"></p>
<p id="dealerHand"></p>
<p id="blackjackResult"></p>

</div>

</div>

<script>

let balance = 1000

function update(){
document.getElementById("balance").innerText = balance
}

function getBet(){
return parseInt(document.getElementById("bet").value)
}


/* COIN */

function coinFlip(){

let guess=document.getElementById("coinGuess").value
let bet=getBet()

let result=Math.random()<0.5?"heads":"tails"

if(guess===result) balance+=bet
else balance-=bet

document.getElementById("coinResult").innerText="Result: "+result

update()

}


/* DICE */

function rollDice(){

let guess=parseInt(document.getElementById("diceGuess").value)
let bet=getBet()

let roll=Math.floor(Math.random()*6)+1

if(guess===roll) balance+=bet*2
else balance-=bet

document.getElementById("diceResult").innerText="Rolled: "+roll

update()

}


/* ROULETTE */

const wheel=document.getElementById("rouletteWheel")
const ctx=wheel.getContext("2d")

let rotation=0

function drawWheel(){

const segments=36
const radius=80

ctx.clearRect(0,0,200,200)

ctx.save()
ctx.translate(100,100)
ctx.rotate(rotation)

for(let i=0;i<segments;i++){

let angle=i*(2*Math.PI/segments)

ctx.beginPath()
ctx.moveTo(0,0)
ctx.arc(0,0,radius,angle,angle+(2*Math.PI/segments))

ctx.fillStyle=i%2?"black":"red"

ctx.fill()

ctx.save()

ctx.rotate(angle+(Math.PI/segments))
ctx.fillStyle="white"
ctx.font="10px Arial"
ctx.fillText(i+1,40,5)

ctx.restore()

}

ctx.restore()

}

drawWheel()

function roulette(){

let guess=parseInt(document.getElementById("rouletteGuess").value)
let bet=getBet()

let spin=Math.floor(Math.random()*36)

let segmentAngle=(2*Math.PI)/36

let targetRotation=(Math.PI/2)-(spin*segmentAngle)

let spins=6*2*Math.PI

let startRotation=rotation
let endRotation=startRotation+spins+targetRotation

let startTime=null

function animate(time){

if(!startTime) startTime=time

let progress=time-startTime

rotation=startRotation+(endRotation-startRotation)*(progress/2000)

drawWheel()

if(progress<2000){
requestAnimationFrame(animate)
}else{

rotation=endRotation

let winningNumber=spin+1

if(guess===winningNumber) balance+=bet*10
else balance-=bet

document.getElementById("rouletteResult").innerText="Number: "+winningNumber

update()

}

}

requestAnimationFrame(animate)

}


/* CRASH */

let crashRunning=false
let multiplier=1
let crashPoint

function startCrash(){

if(crashRunning) return

let bet=getBet()

balance-=bet
update()

crashRunning=true
multiplier=1
crashPoint=Math.random()*5+1

let interval=setInterval(()=>{

multiplier+=0.05

document.getElementById("crashMultiplier").innerText=
multiplier.toFixed(2)+"x"

if(multiplier>=crashPoint){

clearInterval(interval)

crashRunning=false

document.getElementById("crashResult").innerText=
"CRASHED at "+multiplier.toFixed(2)

}

},100)

}

function cashOut(){

if(!crashRunning) return

let bet=getBet()

balance+=Math.floor(bet*multiplier)

update()

document.getElementById("crashResult").innerText=
"Cashed out at "+multiplier.toFixed(2)

crashRunning=false

}


/* PLINKO */

const pcanvas=document.getElementById("plinko")
const pctx=pcanvas.getContext("2d")

function dropBall(){

let bet=getBet()

let slots=[0,0.5,1,2,5,2,1,0.5,0]

let slot=Math.floor(Math.random()*slots.length)

let multiplier=slots[slot]

balance+=bet*multiplier-bet

pctx.clearRect(0,0,300,200)

pctx.beginPath()
pctx.arc(slot*30+20,150,10,0,Math.PI*2)
pctx.fillStyle="red"
pctx.fill()

document.getElementById("plinkoResult").innerText=
"Multiplier: "+multiplier+"x"

update()

}


/* BLACKJACK */

let playerHand=[]
let dealerHand=[]
let gameActive=false

function drawCard(){
return Math.floor(Math.random()*10)+1
}

function handValue(hand){
return hand.reduce((a,b)=>a+b,0)
}

function startBlackjack(){

playerHand=[drawCard(),drawCard()]
dealerHand=[drawCard(),drawCard()]

gameActive=true

updateBlackjack()

}

function hit(){

if(!gameActive) return

playerHand.push(drawCard())

if(handValue(playerHand)>21){

document.getElementById("blackjackResult").innerText="Bust! Dealer wins"
gameActive=false

}

updateBlackjack()

}

function stand(){

if(!gameActive) return

while(handValue(dealerHand)<17){
dealerHand.push(drawCard())
}

let playerScore=handValue(playerHand)
let dealerScore=handValue(dealerHand)

let result=""

if(dealerScore>21 || playerScore>dealerScore){
result="Player wins"
}else if(playerScore<dealerScore){
result="Dealer wins"
}else{
result="Push"
}

document.getElementById("blackjackResult").innerText=result

gameActive=false

updateBlackjack()

}

function updateBlackjack(){

document.getElementById("playerHand").innerText=
"Player: "+playerHand.join(", ")+" (Total "+handValue(playerHand)+")"

document.getElementById("dealerHand").innerText=
"Dealer: "+dealerHand.join(", ")+" (Total "+handValue(dealerHand)+")"

}

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>Probability Simulator</title>

<style>

body{
background:#0b0f1a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#12182b;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #1f2a44;
}

header h1{
color:#4da3ff;
margin:0;
}

nav span{
margin-left:20px;
color:#9bb4d4;
}

.container{
padding:30px;
max-width:1200px;
margin:auto;
}

.points{
font-size:20px;
margin-bottom:15px;
}

.controls{
margin-bottom:20px;
}

input,select{
padding:6px;
margin:5px;
background:#1a2338;
border:1px solid #2a3657;
color:white;
}

button{
padding:10px 16px;
background:#2f6df6;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
margin:5px;
}

button:hover{
background:#4da3ff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#12182b;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
text-align:center;
}

canvas{
background:#0a0d17;
margin-top:10px;
}

.symbols{
font-size:40px;
letter-spacing:10px;
margin:10px;
}

.pointer{
position:absolute;
top:-10px;
left:105px;
width:0;
height:0;
border-left:10px solid transparent;
border-right:10px solid transparent;
border-bottom:20px solid yellow;
}

.wheelbox{
position:relative;
width:220px;
margin:auto;
}

footer{
text-align:center;
padding:20px;
color:#6e87a8;
border-top:2px solid #1f2a44;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>Probability Simulator</h1>

<nav>
<span>Simulations</span>
<span>Experiments</span>
<span>Statistics</span>
</nav>
</header>

<div class="container">

<div class="points">
Points: <span id="balance">1000</span>
</div>

<div class="controls">
Input Value
<input id="bet" type="number" value="50">
</div>

<div class="grid">

<div class="card">

<h2>Wheel Simulation</h2>

<input id="wheelGuess" type="number" min="1" max="36">

<br>

<button onclick="runWheel()">Run</button>

<div class="wheelbox">

<div class="pointer"></div>

<canvas id="wheelCanvas" width="220" height="220"></canvas>

</div>

<p id="wheelResult"></p>

</div>

<div class="card">

<h2>Coin Probability</h2>

<select id="coinGuess">
<option value="heads">Heads</option>
<option value="tails">Tails</option>
</select>

<button onclick="coinTest()">Run</button>

<p id="coinResult"></p>

</div>

<div class="card">

<h2>Integer Generator</h2>

<input id="diceGuess" type="number" min="1" max="6">

<button onclick="numberTest()">Run</button>

<p id="diceResult"></p>

</div>

<div class="card">

<h2>Range Test</h2>

<select id="rangeGuess">
<option value="high">High</option>
<option value="low">Low</option>
</select>

<button onclick="rangeTest()">Run</button>

<p id="rangeResult"></p>

</div>

<div class="card">

<h2>Growth Simulation</h2>

<button onclick="startGrowth()">Start</button>

<h2 id="growthValue">1.00</h2>

<p id="growthResult"></p>

</div>

<div class="card">

<h2>Pattern Generator</h2>

<button onclick="patternTest()">Run</button>

<div id="patternDisplay" class="symbols">❔ ❔ ❔</div>

<p id="patternResult"></p>

</div>

</div>

</div>

<footer>
Interactive probability simulations using JavaScript
</footer>

<script>

let balance=1000

function update(){
document.getElementById("balance").innerText=balance
}

function getBet(){
return parseInt(document.getElementById("bet").value)
}

/* coin */

function coinTest(){

let guess=document.getElementById("coinGuess").value
let bet=getBet()

let value=Math.random()<0.5?"heads":"tails"

if(guess===value) balance+=bet
else balance-=bet

document.getElementById("coinResult").innerText="Result: "+value

update()

}

/* number */

function numberTest(){

let guess=parseInt(document.getElementById("diceGuess").value)
let bet=getBet()

let value=Math.floor(Math.random()*6)+1

if(guess===value) balance+=bet*2
else balance-=bet

document.getElementById("diceResult").innerText="Value: "+value

update()

}

/* range */

function rangeTest(){

let guess=document.getElementById("rangeGuess").value
let bet=getBet()

let value=Math.floor(Math.random()*100)+1

let result=value>50?"high":"low"

if(result===guess) balance+=bet
else balance-=bet

document.getElementById("rangeResult").innerText="Number: "+value

update()

}

/* pattern */

const items=["A","B","C","D","E"]

function patternTest(){

let a=items[Math.floor(Math.random()*items.length)]
let b=items[Math.floor(Math.random()*items.length)]
let c=items[Math.floor(Math.random()*items.length)]

document.getElementById("patternDisplay").innerText=a+" "+b+" "+c

}

/* wheel */

const wheel=document.getElementById("wheelCanvas")
const ctx=wheel.getContext("2d")

let rotation=0

function drawWheel(){

const segments=36
const radius=100

ctx.clearRect(0,0,220,220)

ctx.save()
ctx.translate(110,110)
ctx.rotate(rotation)

for(let i=0;i<segments;i++){

let start=i*(2*Math.PI/segments)
let end=start+(2*Math.PI/segments)

ctx.beginPath()
ctx.moveTo(0,0)
ctx.arc(0,0,radius,start,end)

ctx.fillStyle=i%2?"#4da3ff":"#1f2a44"

ctx.fill()

}

ctx.restore()

}

drawWheel()

function runWheel(){

rotation+=Math.PI/3
drawWheel()

let value=Math.floor(Math.random()*36)+1

document.getElementById("wheelResult").innerText="Value: "+value

}

/* growth */

function startGrowth(){

let v=1

let interval=setInterval(()=>{

v+=0.1

document.getElementById("growthValue").innerText=v.toFixed(2)

if(v>3){

clearInterval(interval)

document.getElementById("growthResult").innerText="Finished"

}

},100)

}

</script>

</body>
</html>

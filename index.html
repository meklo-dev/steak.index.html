<!DOCTYPE html>
<html>

<head>

<title>steak.com</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

header{
background:#065f46;
padding:15px;
}

.container{
padding:20px;
}

.game{
background:#1e293b;
padding:20px;
margin:20px auto;
border-radius:6px;
max-width:520px;
}

button{
padding:10px 16px;
background:#10b981;
border:none;
color:white;
cursor:pointer;
border-radius:4px;
margin:5px;
}

button:hover{
background:#059669;
}

input,select{
padding:6px;
margin:5px;
}

canvas{
background:#111;
margin-top:10px;
border-radius:50%;
}

</style>

</head>

<body>

<header>
<h1>steak.com</h1>
</header>

<div class="container">

<h2>Balance: <span id="balance">1000</span> coins</h2>

Bet Amount
<input id="bet" type="number" value="50">

<!-- ROULETTE -->

<div class="game">

<h2>Roulette</h2>

<input id="rouletteGuess" type="number" min="1" max="36">

<button onclick="roulette()">Spin</button>

<div style="position:relative;width:200px;margin:auto">

<div style="
position:absolute;
top:-5px;
left:95px;
width:0;
height:0;
border-left:10px solid transparent;
border-right:10px solid transparent;
border-bottom:20px solid yellow;
z-index:10;
"></div>

<canvas id="rouletteWheel" width="200" height="200"></canvas>

</div>

<p id="rouletteResult"></p>

</div>

<!-- COIN -->

<div class="game">

<h2>Coin Flip</h2>

<select id="coinGuess">
<option value="heads">Heads</option>
<option value="tails">Tails</option>
</select>

<button onclick="coinFlip()">Flip</button>

<p id="coinResult"></p>

</div>

<!-- DICE -->

<div class="game">

<h2>Dice</h2>

<input id="diceGuess" type="number" min="1" max="6">

<button onclick="rollDice()">Roll</button>

<p id="diceResult"></p>

</div>

<!-- CRASH -->

<div class="game">

<h2>Crash</h2>

<button onclick="startCrash()">Start</button>
<button onclick="cashOut()">Cash Out</button>

<h2 id="crashMultiplier">1.00x</h2>

<p id="crashResult"></p>

</div>

<!-- PLINKO -->

<div class="game">

<h2>Plinko</h2>

<button onclick="dropBall()">Drop Ball</button>

<canvas id="plinko" width="300" height="200"></canvas>

<p id="plinkoResult"></p>

</div>

<!-- BLACKJACK -->

<div class="game">

<h2>Blackjack</h2>

<button onclick="startBlackjack()">Start Game</button>
<button onclick="hit()">Hit</button>
<button onclick="stand()">Stand</button>

<p id="playerHand"></p>
<p id="dealerHand"></p>
<p id="blackjackResult"></p>

</div>

</div>

<script>

let balance=1000

function update(){
document.getElementById("balance").innerText=balance
}

function getBet(){
return parseInt(document.getElementById("bet").value)
}

/* COIN */

function coinFlip(){

let guess=document.getElementById("coinGuess").value
let bet=getBet()

let result=Math.random()<0.5?"heads":"tails"

if(guess===result) balance+=bet
else balance-=bet

document.getElementById("coinResult").innerText="Result: "+result

update()

}

/* DICE */

function rollDice(){

let guess=parseInt(document.getElementById("diceGuess").value)
let bet=getBet()

let roll=Math.floor(Math.random()*6)+1

if(guess===roll) balance+=bet*2
else balance-=bet

document.getElementById("diceResult").innerText="Rolled: "+roll

update()

}

/* CRASH */

let crashRunning=false
let multiplier=1
let crashPoint

function startCrash(){

if(crashRunning) return

let bet=getBet()

balance-=bet
update()

crashRunning=true
multiplier=1
crashPoint=Math.random()*5+1

let interval=setInterval(()=>{

multiplier+=0.05

document.getElementById("crashMultiplier").innerText=
multiplier.toFixed(2)+"x"

if(multiplier>=crashPoint){

clearInterval(interval)

crashRunning=false

document.getElementById("crashResult").innerText=
"Crash! You lost your bet."

}

},100)

}

function cashOut(){

if(!crashRunning) return

let bet=getBet()

balance+=Math.floor(bet*multiplier)

update()

document.getElementById("crashResult").innerText=
"Cashed out at "+multiplier.toFixed(2)

crashRunning=false

}

/* BLACKJACK */

const suits=["♠","♥","♦","♣"]

let playerHand=[]
let dealerHand=[]
let gameActive=false
let blackjackBet=0

function drawCard(){

let value=Math.floor(Math.random()*10)+1
let suit=suits[Math.floor(Math.random()*4)]

return {value:value,display:value+suit}

}

function handValue(hand){

return hand.reduce((sum,card)=>sum+card.value,0)

}

function startBlackjack(){

blackjackBet=getBet()

balance-=blackjackBet
update()

playerHand=[drawCard(),drawCard()]
dealerHand=[drawCard(),drawCard()]

gameActive=true

updateBlackjack()

}

function hit(){

if(!gameActive) return

playerHand.push(drawCard())

if(handValue(playerHand)>21){

document.getElementById("blackjackResult").innerText="Bust! Dealer wins"
gameActive=false

}

updateBlackjack()

}

function stand(){

if(!gameActive) return

while(handValue(dealerHand)<17){
dealerHand.push(drawCard())
}

let playerScore=handValue(playerHand)
let dealerScore=handValue(dealerHand)

let result=""

if(dealerScore>21||playerScore>dealerScore){

balance+=blackjackBet*2
result="Player wins"

}
else if(playerScore<dealerScore){

result="Dealer wins"

}
else{

balance+=blackjackBet
result="Push"

}

update()

document.getElementById("blackjackResult").innerText=result

gameActive=false

updateBlackjack()

}

function updateBlackjack(){

document.getElementById("playerHand").innerText=
"Player: "+playerHand.map(c=>c.display).join(" ")+" ("+handValue(playerHand)+")"

document.getElementById("dealerHand").innerText=
"Dealer: "+dealerHand.map(c=>c.display).join(" ")+" ("+handValue(dealerHand)+")"

}

</script>

</body>

</html>
